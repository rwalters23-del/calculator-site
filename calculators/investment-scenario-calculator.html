<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Scenario Calculator - Free Calculator Max</title>
    <meta name="description" content="Calculate the future value of your investments with our advanced scenario planner. Explore growth, inflation, tax, and diversification impacts.">
    <!-- Links to main site's CSS/meta tags can be added here if they are external -->

    <!-- Styles for the calculator page, adjusted to match website theme -->
    <style>
        /* Basic Reset and Body Styles aligned with main site */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: #0f172a; /* Dark background from main site */
            color: #e2e8f0; /* Light text from main site */
            line-height: 1.6;
            padding: 0; /* Remove default body padding, content is in container */
        }
        .container { /* Ensure this aligns with the main site's container */
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }
        /* Section styling (if the calculator is itself a section) - adjust as needed */
        .section { margin-top: 30px; margin-bottom: 30px; }
        .section h2 {
            color: #38bdf8; /* Accent color for section titles */
            font-size: 1.8rem; /* Larger heading */
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #334155; /* Separator like main site */
        }

        /* Main Calculator Container - styled like the cards on the main page */
        .calculator-container {
            background-color: #1e293b; /* Dark card background from main site */
            border: 1px solid #334155; /* Darker border from main site cards */
            padding: 30px; /* Slightly more padding */
            border-radius: 12px; /* Match main site card border-radius */
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); /* Deeper shadow */
        }
        h1 { /* Style for the calculator page title */
            font-size: 2.5rem;
            background: linear-gradient(90deg, #38bdf8, #8b5cf6); /* Gradient like main site hero */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 700; /* Bold */
        }
        .calculator-container > p { /* Intro paragraph under title */
            text-align: center;
            color: #94a3b8; /* Lighter text for intro */
            font-size: 1.1rem;
            line-height: 1.7;
            max-width: 700px;
            margin: 0 auto 40px auto; /* center and add more margin */
        }

        /* Input Groups - styling for labels, inputs, selects */
        .input-group { margin-bottom: 18px; } /* More spacing */
        label {
            display: block;
            margin-bottom: 8px; /* More space below label */
            font-weight: bold;
            color: #e2e8f0; /* Lighter color for labels */
            font-size: 1.05rem;
        }
        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 12px 15px; /* Increased padding */
            border: 1px solid #334155; /* Darker border for inputs, matches card border */
            border-radius: 8px; /* Slightly larger radius */
            background-color: #0f172a; /* Dark background for input fields */
            color: #e2e8f0; /* Light text color in inputs */
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="number"]:focus, input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #38bdf8; /* Highlight color on focus */
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.3); /* Subtle glow effect */
        }
        select { /* Custom styling for select dropdowns */
            appearance: none; /* Remove default system appearance */
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="%23e2e8f0"><path fill-rule="evenodd" d="M8 11.293l-4.146-3.147a.5.5 0 0 1 .606-.758l3.54 2.733 3.54-2.733a.5.5 0 0 1 .606.758L8 11.293z"/></svg>'); /* Custom dropdown arrow */
            background-repeat: no-repeat;
            background-position: right 12px center; /* Position arrow */
            background-size: 16px 12px;
            padding-right: 40px; /* Make room for the arrow */
        }

        .info-icon {
            cursor: help;
            margin-left: 5px;
            color: #94a3b8; /* Lighter info icon color */
            font-weight: normal;
            font-size: 0.85rem;
        }

        hr {
            border: 0;
            height: 1px;
            background: #334155; /* Darker hr color, matches cards */
            margin: 30px 0; /* More vertical space around hr */
        }

        /* Portfolio Diversification section */
        h3 { /* All H3 elements in the calculator */
            color: #38bdf8; /* Accent color for headings */
            margin-bottom: 15px;
            font-size: 1.4rem;
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 1px dashed #334155; /* Dashed border for subheadings */
            display: inline-block; /* Ensure border only spans content */
        }
        .calculator-container h3:last-of-type { /* Last h3 might not need border */
            border-bottom: none;
        }

        /* Goal-Based Planning section */
        #solve-for { /* Specific styling for solve-for dropdown */
             min-width: 220px; /* Ensure it doesn't get too narrow */
        }

        /* Button Styles */
        button {
            background-color: #38bdf8; /* Accent color for buttons */
            color: #0f172a; /* Dark text color on button */
            padding: 12px 24px;
            border: none;
            border-radius: 8px; /* Match input field radius */
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background-color 0.3s , transform 0.2s ease, box-shadow 0.3s ease;
        }
        button:hover {
            background-color: #7dd3fc; /* Lighter accent on hover */
            transform: translateY(-2px); /* Slight lift effect */
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4); /* Glow effect */
        }
        button:active {
            transform: translateY(0); /* Press effect */
        }

        /* Results Section */
        .results-container {
            margin-top: 30px;
            border-top: 1px solid #334155; /* Match main site section borders */
            padding-top: 30px;
            background-color: #1e293b; /* Dark background like cards */
            padding: 25px; /* Consistent padding */
            border-radius: 12px; /* Consistent border radius */
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); /* Deeper shadow */
        }
        .results-container h3 {
            margin-top: 0;
            color: #38bdf8; /* Accent color for results heading */
            margin-bottom: 20px;
            text-align: center;
            border-bottom: none; /* Remove dashed border from results heading */
        }
        .result-item {
            margin-bottom: 14px; /* More space between result items */
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #334155; /* Dashed separator similar to main site cards */
            font-size: 1rem;
            color: #cbd5e1; /* Slightly lighter text color for results */
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-item span {
            font-weight: bold;
            color: #38bdf8; /* Accent color for values */
        }
        .result-item[title] { /* Style for tooltips */
            border-bottom-style: dotted;
        }
        .result-item[title]:hover {
             border-bottom-style: solid;
        }


        /* Chart Styles */
        #chart-container {
            margin-top: 35px; /* More space above chart */
            height: 400px; /* Increased height for better chart visibility */
            width: 100%;
            background-color: #1e293b; /* Dark background for chart area */
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #334155;
        }
        /* Ensure canvas respects container size */
        #investmentChart {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .calculator-container { padding: 20px; }
            button { font-size: 0.95rem; padding: 10px 20px; }
            input[type="number"], input[type="text"], select { padding: 10px; font-size: 1rem; }
            .results-container { margin-top: 20px; padding-top: 20px; }
            #chart-container { height: 300px; }
            .result-item { font-size: 0.95rem; }
        }
         @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .input-group { margin-bottom: 12px; }
            label { font-size: 0.95rem; }
            input[type="number"], input[type="text"], select { padding: 8px 12px; font-size: 0.95rem; }
            select { padding-right: 30px; }
            button { padding: 10px 18px; font-size: 0.9rem; }
            .result-item { flex-direction: column; align-items: flex-start; }
            .result-item span { margin-top: 4px;}
            #chart-container { height: 250px; }
        }
    </style>
    <!-- Include Chart.js library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
